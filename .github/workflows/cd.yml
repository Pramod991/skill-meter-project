name: CD

on: 
  workflow_run:
    workflows: [CI]
    types: [Completed] 
    branches: [main]
   
jobs: 
  deploy: 
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps: 
      -uses: appleboy/ssh-action@v1
       with:
         host: ${{ secrets.EC2_HOST }}
         username: ${{ secrets.EC2_USER }}
         key: ${{ secrets.EC2_SSH_KEY }}
                   
         script: |     
            if [ ! -d ~/skill-meter-project ]; then
            git clone ${{ github.server_url }}/${{ github.repository }}.git ~ /skill-meter-project
            fi
            cd ~/skill-meter-project
            git pull origin main
            if [ ! -f .env ]; then
              echo "ERROR: ~/skill-meter-project/.env is missing. create it with DOCkERHUB_USERNAME and DB credentials."
              exit 1
            fi

             docker compose pull
             docker compose up -d
             docker image prune -f
